# /etc/bluetooth/main.conf
# BlueZ configuration for carplay-audio (BMW E46 head unit)

[General]

# Nom affiché lors du scan sur le téléphone
Name = BMW E46

# Classe Bluetooth : Audio service | Audio/Video major | Car Audio minor
Class = 0x240408

# Toujours découvrable (0 = pas de timeout)
DiscoverableTimeout = 0

# Toujours couplable
PairableTimeout = 0

# Reconnexion rapide après coupure
FastConnectable = true

# Pas de privacy — adresse publique fixe (nécessaire pour l'auto-reconnexion)
Privacy = off

[Policy]

# Active le Bluetooth automatiquement au démarrage
AutoEnable = true

# Reconnexion automatique après déconnexion inattendue
# Tentatives : 7, avec délais croissants (1, 2, 4, 8, 16, 32, 64 secondes)
ReconnectAttempts = 7
ReconnectIntervals = 1,2,4,8,16,32,64
