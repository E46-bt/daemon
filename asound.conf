# /etc/asound.conf
#
# Loopback substream 0 — AirPlay (shairport-sync)
#
#   shairport-sync écrit sur  pcm.airplay  →  hw:Loopback,0,0
#   carplay-audio lit sur                  →  hw:Loopback,1,0
#   Format : S32LE, 352800 Hz, stéréo
#
# Loopback substream 1 — Bluetooth (bluez-alsa)
#
#   bluealsa-aplay écrit sur  pcm.bt_sink  →  hw:Loopback,0,1
#   carplay-audio lit sur                  →  hw:Loopback,1,1
#   Format : S16LE, 48000 Hz, stéréo (normalisé par le plug layer)
#
# Prérequis :
#   sudo modprobe snd_aloop pcm_substreams=2
#   echo "options snd_aloop pcm_substreams=2" | sudo tee /etc/modprobe.d/snd-aloop.conf
#   echo "snd_aloop" | sudo tee /etc/modules-load.d/snd-aloop.conf

# ── AirPlay ───────────────────────────────────────────────────────────────────

pcm.airplay {
    type hw
    card Loopback
    device 0
    subdevice 0
}

ctl.airplay {
    type hw
    card Loopback
}

# ── Bluetooth ─────────────────────────────────────────────────────────────────
#
# Le plug normalise n'importe quel format BT (SBC 44100, AAC 48000…) vers
# 48000 Hz S16LE stéréo avant d'écrire sur le loopback.
# carplay-audio capture donc toujours à 48000 Hz côté hw:Loopback,1,1.

pcm.bt_sink {
    type plug
    slave {
        pcm {
            type hw
            card Loopback
            device 0
            subdevice 1
        }
        rate     48000
        format   S16_LE
        channels 2
    }
}