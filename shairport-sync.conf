// shairport-sync.conf for carplay-audio
//
// Output: ALSA device "airplay" (alias for hw:Loopback,0,0 defined in /etc/asound.conf)
// Rate: 352800 Hz, S32_LE -- soxr resampler is disabled because the Pi cannot handle
// the CPU load at 352.8 kHz in real time. shairport-sync does not support FLOAT_LE
// as an ALSA output format, so S32_LE is used and converted to f32 in the service.

general =
{
    name = "BMW E46";
    interpolation = "basic"; // soxr is too heavy at 352800 Hz on the Pi
};

sessioncontrol =
{
    allow_session_interruption = "yes";
};

alsa =
{
    output_device = "airplay";
    output_rate = 352800;
    output_format = "S32_LE";
};

metadata =
{
    enabled = "yes";
    include_cover_art = "no";
    pipe_name = "/tmp/shairport-sync-metadata";
};
